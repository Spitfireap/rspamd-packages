name: Test package (Reusable)

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
        description: 'Untampered docker image to use for testing'
      name:
        required: true
        type: string
        description: 'The target OS/distro name to test (e.g., ubuntu-jammy, centos-9)'
      platform:
        required: true
        type: string
        description: 'X64 or ARM64'
      revision:
        required: false
        type: string
        description: >-
          Unused. Retained for compatibility with build_test.yml callers that
          still pass the built rspamd revision. The functional suite that used
          it was removed; package testing here is install + smoke only.

jobs:
  test:
    name: 'test (${{ inputs.name }}/${{ inputs.platform }})'
    runs-on: ${{ inputs.platform == 'ARM64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    container:
      image: ${{ inputs.image }}

    steps:
      - name: Download package(s)
        uses: actions/download-artifact@v4
        with:
          pattern: packages-${{ inputs.name }}-${{ inputs.platform }}
          path: out
          merge-multiple: true

      - name: Install package
        shell: bash
        run: |
          # Install the freshly built rspamd package and let the distro package
          # manager resolve its runtime dependencies. This is the part that
          # actually validates *our* package per distro/arch: it catches broken
          # dependencies, dpkg/dnf errors, file conflicts and missing libraries.
          #
          # We deliberately do NOT run the rspamd functional (robot) suite here.
          # That suite is checked out at the packaged rspamd revision, but it
          # needs a full runtime environment (Redis, network mocks, specific
          # service wiring) that this package-install container does not
          # faithfully reproduce. The result is environment-dependent, flaky
          # failures across the distro grid that say nothing about the package.
          # Functional/unit coverage belongs to the rspamd repository's own CI.
          if [[ "${{ inputs.name }}" == ubuntu-* || "${{ inputs.name }}" == debian-* ]]; then
            echo "Installing DEB packages..."
            apt-get update
            shopt -s nullglob
            if [[ "${{ inputs.platform }}" == "ARM64" ]]; then arch=arm64; else arch=amd64; fi
            debs=( out/${{ inputs.name }}/rspamd_*_${arch}.deb out/${{ inputs.name }}/rspamd-dbg_*_${arch}.deb )
            if (( ${#debs[@]} == 0 )); then
              echo "No DEB files found for arch $arch under out/${{ inputs.name }}" >&2
              exit 1
            fi
            dpkg -i "${debs[@]}" || apt-get install -f -y
          elif [[ "${{ inputs.name }}" == centos-* ]] ; then
            echo "Setting up repositories..."
            # EPEL/CRB are needed so dnf can resolve rspamd's runtime deps.
            dnf -qy install epel-release
            crb enable
            echo "Installing RPM packages..."
            # Avoid installing source RPMs; select only current arch artifacts
            shopt -s nullglob
            arch=$(rpm -E %_arch)
            rpms=(
              out/${{ inputs.name }}/rspamd-[0-9]*.${arch}.rpm
              out/${{ inputs.name }}/rspamd-debuginfo-[0-9]*.${arch}.rpm
            )
            if (( ${#rpms[@]} == 0 )); then
              echo "No RPM files found for arch $arch under out/${{ inputs.name }}" >&2
              exit 1
            fi
            dnf install -y "${rpms[@]}"
          else
            echo "Bad inputs.name: ${{ inputs.name }}"
            exit 1
          fi

      - name: Smoke test installed package
        shell: bash
        run: |
          # Lightweight, deterministic sanity checks (no network, no Redis, no
          # rspamd master checkout): the installed binary runs and the shipped
          # default configuration parses with the shipped build. A failure here
          # means the package itself is broken, which is exactly what we want to
          # gate on.
          set -x
          rspamd --version
          # Configuration test against the packaged default /etc/rspamd config.
          rspamadm configtest
